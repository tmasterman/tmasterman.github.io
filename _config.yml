# Site settings
title: Tula Masterman
email: tula@themastermans.com
description: AI agent researcher and builder. Making complex systems accessible.
baseurl: ""
url: "https://tulamasterman.com"
github_username: tmasterman

# Build settings
theme: minima
markdown: kramdown
plugins:
  - jekyll-feed

# Prevent Jekyll from auto-extracting excerpts
excerpt_separator: "<!--more-->"

# Permalink structure for posts
permalink: /writing/:title/

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - mockups/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
